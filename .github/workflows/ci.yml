name: l28-ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install M2M verifier dependency
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-m2m.txt

      - name: Compile coin and tests
        run: python -m compileall -q coin tests

      - name: Protocol invariants
        run: python -m coin.invariants

      - name: Unit tests
        run: python -m unittest discover -s tests -v
